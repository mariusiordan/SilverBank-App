# .github/workflows/deploy.yml
# Trigger: push to main branch
#
# Pipeline 3 - Production Deployment (Blue/Green Strategy)
# Flow:
#   lint
#     ├── test-jwt      ┐
#     ├── test-auth     ├── build-images → push-images → manual approval → deploy → aws-update
#     └── test-account  ┘

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1 - Lint
  # Runs ESLint static analysis on the codebase
  # Catches syntax errors and code style issues before running tests
  # ============================================================
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "Installing Node.js dependencies..."
          npm ci
          echo "OK - Dependencies installed"

      - name: Run ESLint
        run: |
          echo "Running ESLint static analysis..."
          npm run lint
          echo "OK - Lint passed"

  # ============================================================
  # JOB 2 - JWT Tests
  # Validates JWT token generation, signing, and verification
  # Runs in parallel with Auth and Account tests after lint passes
  # ============================================================
  test-jwt:
    name: JWT Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run JWT tests
        run: |
          echo "Running JWT unit tests..."
          npx vitest run __tests__/jwt.test.ts
          echo "OK - JWT tests passed"

  # ============================================================
  # JOB 3 - Auth Tests
  # Tests user authentication flows: login and registration
  # Runs in parallel with JWT and Account tests after lint passes
  # ============================================================
  test-auth:
    name: Auth Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run auth tests
        run: |
          echo "Running authentication unit tests..."
          npx vitest run __tests__/login.test.ts
          npx vitest run __tests__/register.test.ts
          echo "OK - Auth tests passed"

  # ============================================================
  # JOB 4 - Account Tests
  # Tests account management operations
  # Runs in parallel with JWT and Auth tests after lint passes
  # ============================================================
  test-account:
    name: Account Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run account tests
        run: |
          echo "Running account management unit tests..."
          npx vitest run __tests__/account.test.ts
          echo "OK - Account tests passed"

  # ============================================================
  # JOB 5 - Build Docker Images
  # Builds frontend (Next.js) and backend (Express.js) Docker images
  # Only runs after all three test suites pass
  # Uses multi-stage Dockerfiles to produce optimized production images
  # Images are built but NOT pushed yet - push happens in the next job
  # ============================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-24.04
    needs: [test-jwt, test-auth, test-account]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          VERSION="v1.0"
          DATE=$(date +%Y-%m-%d)
          SHA=$(git rev-parse --short HEAD)
          TAG="${VERSION}-prod-${DATE}-sha-${SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: |
          echo "Building frontend Docker image (Next.js)..."
          echo "This step compiles the React application into a production-ready image"

      - uses: docker/build-push-action@v5
        with:
          context: ./silver-bank
          file: ./silver-bank/Dockerfile
          platforms: linux/amd64
          push: false
          tags: |
            ghcr.io/mariusiordan/silverbank-frontend:${{ steps.tag.outputs.tag }}

      - name: Build backend image
        run: |
          echo "Building backend Docker image (Express.js + Prisma)..."
          echo "This step compiles TypeScript and creates a production-ready API image"

      - uses: docker/build-push-action@v5
        with:
          context: ./silver-bank/backend
          file: ./silver-bank/backend/Dockerfile
          platforms: linux/amd64
          push: false
          tags: |
            ghcr.io/mariusiordan/silverbank-backend:${{ steps.tag.outputs.tag }}

      - name: Build summary
        run: |
          echo "OK - Both Docker images built successfully"
          echo "Frontend image: ghcr.io/mariusiordan/silverbank-frontend:${{ steps.tag.outputs.tag }}"
          echo "Backend image:  ghcr.io/mariusiordan/silverbank-backend:${{ steps.tag.outputs.tag }}"

  # ============================================================
  # JOB 6 - Push Docker Images to Registry
  # Pushes the built images to GitHub Container Registry (ghcr.io)
  # Images are tagged with a unique build identifier for traceability
  # The ':latest' tag is NOT applied here - it is only promoted after
  # a successful production deployment and 10-minute health check window
  # ============================================================
  push-images:
    name: Push Images to Registry
    runs-on: ubuntu-24.04
    needs: build-images
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ needs.build-images.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: |
          echo "Authenticating with GitHub Container Registry (ghcr.io)..."
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mariusiordan --password-stdin
          echo "OK - Authentication successful"

      - name: Push frontend image
        run: |
          echo "Pushing frontend image to registry..."
          echo "Tag: ${{ needs.build-images.outputs.image_tag }}"

      - uses: docker/build-push-action@v5
        with:
          context: ./silver-bank
          file: ./silver-bank/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-frontend:${{ needs.build-images.outputs.image_tag }}

      - name: Push backend image
        run: |
          echo "Pushing backend image to registry..."
          echo "Tag: ${{ needs.build-images.outputs.image_tag }}"

      - uses: docker/build-push-action@v5
        with:
          context: ./silver-bank/backend
          file: ./silver-bank/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-backend:${{ needs.build-images.outputs.image_tag }}

      - name: Push summary
        run: |
          echo "OK - Both images pushed to GitHub Container Registry"
          echo "Frontend: ghcr.io/mariusiordan/silverbank-frontend:${{ needs.build-images.outputs.image_tag }}"
          echo "Backend:  ghcr.io/mariusiordan/silverbank-backend:${{ needs.build-images.outputs.image_tag }}"
          echo "Note: ':latest' tag will only be applied after successful production deployment"

  # ============================================================
  # JOB 7 - Deploy to Production (Blue/Green Strategy)
  # Requires manual approval before execution (GitHub Environment protection)
  # Automatically detects the idle environment (Blue or Green)
  # Deploys to idle, runs smoke tests, switches traffic, monitors 10 minutes
  # If health checks fail 3 times consecutively - auto rollback to previous env
  # If stable for 10 minutes - promotes image tag to ':latest' for AWS DR
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: push-images
    environment: production
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Install Ansible
        run: |
          echo "Installing Ansible..."
          pip install ansible --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "OK - Ansible installed"

      - name: Setup SSH key
        run: |
          echo "Configuring SSH access to production VMs..."
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "OK - SSH configured"

      - name: Setup Ansible vault password
        run: |
          echo "Configuring Ansible Vault for secrets decryption..."
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault-password
          chmod 600 ~/.vault-password
          echo "OK - Vault password configured"

      - name: Deploy to production (Blue/Green)
        run: |
          echo "Starting Blue/Green deployment to production..."
          echo "Image tag: ${{ needs.push-images.outputs.image_tag }}"
          echo "Step 1 - Detecting active environment (Blue or Green)"
          echo "Step 2 - Deploying to idle environment"
          echo "Step 3 - Running smoke tests on idle environment"
          echo "Step 4 - Switching nginx traffic to new environment"
          echo "Step 5 - Monitoring for 10 minutes with auto-rollback"
          echo "Step 6 - Promoting to ':latest' if stable"
          cd proxmox-silverbank/ansible
          ansible-playbook playbooks/deploy-production.yml \
            -e "app_tag=${{ needs.push-images.outputs.image_tag }}" \
            -i inventory.ini

      - name: Production health check
        run: |
          echo "Running final production health check..."
          sleep 15
          curl -f http://192.168.7.50/api/health || exit 1
          echo "OK - Production is healthy"
          echo "OK - Deployment complete"

  # ============================================================
  # JOB 8 - Update AWS Disaster Recovery (if active)
  # Checks if the AWS DR environment is running by probing the health endpoint
  # If active - pulls ':latest' image (just promoted) and redeploys
  # If not active - skips silently, no action required
  # AWS IPs are read dynamically from Terraform state in S3
  # This ensures the DR environment always mirrors production
  # ============================================================
  aws-update:
    name: Update AWS DR (if active)
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Check if AWS DR is active
        id: aws_check
        run: |
          echo "Checking if AWS Disaster Recovery environment is active..."
          if curl -sf --max-time 10 http://18.169.161.155/api/health > /dev/null 2>&1; then
            echo "active=true" >> $GITHUB_OUTPUT
            echo "✅ OK - AWS DR is active - update will proceed"
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "INFO - AWS DR is not active - skipping update"
          fi

      - name: Install Ansible
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "Installing Ansible..."
          pip install ansible --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "✅ OK - Ansible installed"

      - name: Setup SSH key
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "Configuring SSH access to AWS VMs..."
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "✅ OK - SSH configured"

      - name: Setup Ansible vault password
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "Configuring Ansible Vault..."
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault-password
          chmod 600 ~/.vault-password
          echo "✅ OK - Vault password configured"

      - name: Configure AWS credentials
        if: steps.aws_check.outputs.active == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Setup Terraform
        if: steps.aws_check.outputs.active == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get AWS IPs from Terraform state
        if: steps.aws_check.outputs.active == 'true'
        id: tf
        working-directory: aws-silverbank/terraform
        run: |
          echo "Reading infrastructure IPs from Terraform state in S3..."
          terraform init -reconfigure
          echo "edge_ip=$(terraform output -raw edge_elastic_ip)" >> $GITHUB_OUTPUT
          echo "blue_ip=$(terraform output -raw blue_private_ip)" >> $GITHUB_OUTPUT
          echo "db_ip=$(terraform output -raw db_private_ip)" >> $GITHUB_OUTPUT
          echo "✅ OK - IPs retrieved from Terraform state"

      - name: Generate AWS inventory
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "Generating Ansible inventory from Terraform outputs..."
          cat > aws-silverbank/ansible/inventory-aws.ini << EOF
          [edge]
          edge-nginx ansible_host=${{ steps.tf.outputs.edge_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [prod]
          prod-vm1-BLUE ansible_host=${{ steps.tf.outputs.blue_ip }}

          [prod:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/id_ed25519
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@${{ steps.tf.outputs.edge_ip }}'

          [db]
          db-postgresql ansible_host=${{ steps.tf.outputs.db_ip }}

          [db:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/id_ed25519
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@${{ steps.tf.outputs.edge_ip }}'
          EOF
          echo "✅ OK - Inventory generated"

      - name: Update app on AWS DR
        if: steps.aws_check.outputs.active == 'true'
        working-directory: aws-silverbank/ansible
        run: |
          echo "Deploying ':latest' image to AWS DR environment..."
          echo "This image was just promoted after a successful 10-minute monitoring window on Proxmox"
          ansible-playbook playbooks/deploy-production.yml \
            -i inventory-aws.ini \
            -e "app_tag=latest" \
            --vault-password-file ~/.vault-password

      - name: Health check AWS DR
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "Running health check on AWS DR environment..."
          sleep 30
          curl -f http://${{ steps.tf.outputs.edge_ip }}/api/health || exit 1
          echo "✅OK - AWS DR updated and healthy"
          echo "✅ OK - Production and DR environments are now in sync"