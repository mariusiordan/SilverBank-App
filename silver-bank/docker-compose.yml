version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: silverbank-db
    restart: always
    environment:
      POSTGRES_USER: silverbank
      POSTGRES_PASSWORD: silverbank123
      POSTGRES_DB: silverbank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silverbank"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: silverbank-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://silverbank:silverbank123@db:5432/silverbank
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
