name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: silver-bank

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -la
          echo "---- silver-bank ----"
          ls -la silver-bank || true
          echo "---- lockfile check ----"
          test -f silver-bank/package-lock.json && echo "lockfile found" || echo "lockfile missing"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

          cache: "npm"
          cache-dependency-path: silver-bank/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test