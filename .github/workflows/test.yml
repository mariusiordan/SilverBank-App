name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint + Vitest
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'silver-bank/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test