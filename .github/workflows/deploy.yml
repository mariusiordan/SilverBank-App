# .github/workflows/deploy.yml
# Trigger: push to main branch
# Flow:
#   lint
#     ├── test-jwt      ┐
#     ├── test-auth     ├── build frontend + backend → manual approval → Blue/Green → smoke tests → promote to :latest
#     └── test-account  ┘

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  test-jwt:
    name: JWT Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/jwt.test.ts

  test-auth:
    name: Auth Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/login.test.ts
      - run: npx vitest run __tests__/register.test.ts

  test-account:
    name: Account Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/account.test.ts

  build:
    name: Build Docker images
    runs-on: ubuntu-24.04
    needs: [test-jwt, test-auth, test-account]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          VERSION="v1.0"
          DATE=$(date +%Y-%m-%d)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=${VERSION}-prod-${DATE}-sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mariusiordan --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./silver-bank
          file: ./silver-bank/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-frontend:${{ steps.tag.outputs.tag }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./silver-bank/backend
          file: ./silver-bank/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-backend:${{ steps.tag.outputs.tag }}

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build
    environment: production
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Install Ansible
        run: |
          pip install ansible --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Setup Ansible vault password
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault-password
          chmod 600 ~/.vault-password

      - name: Deploy to idle environment + monitor 10min + promote to latest
        run: |
          cd proxmox-silverbank/ansible
          ansible-playbook playbooks/deploy-production.yml \
            -e "app_tag=${{ needs.build.outputs.image_tag }}" \
            -i inventory.ini

      - name: Smoke tests
        run: |
          sleep 15
          curl -f http://192.168.7.50/api/health || exit 1
          echo "✅ Production health check passed"
  aws-update:
    name: Update AWS DR (if active)
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Check if AWS DR is active
        id: aws_check
        run: |
          EDGE_IP=$(curl -sf --max-time 10 https://api.ipify.org || echo "unknown")
          if curl -sf --max-time 10 http://18.169.161.155/api/health > /dev/null 2>&1; then
            echo "active=true" >> $GITHUB_OUTPUT
            echo "✅ AWS DR is active - will update"
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "⏭️ AWS DR is not active - skipping"
          fi

      - name: Install Ansible
        if: steps.aws_check.outputs.active == 'true'
        run: |
          pip install ansible --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup SSH key
        if: steps.aws_check.outputs.active == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Setup Ansible vault password
        if: steps.aws_check.outputs.active == 'true'
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault-password
          chmod 600 ~/.vault-password

      - name: Configure AWS credentials
        if: steps.aws_check.outputs.active == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Setup Terraform
        if: steps.aws_check.outputs.active == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get AWS IPs from Terraform state
        if: steps.aws_check.outputs.active == 'true'
        id: tf
        working-directory: aws-silverbank/terraform
        run: |
          terraform init -reconfigure
          echo "edge_ip=$(terraform output -raw edge_elastic_ip)" >> $GITHUB_OUTPUT
          echo "blue_ip=$(terraform output -raw blue_private_ip)" >> $GITHUB_OUTPUT
          echo "db_ip=$(terraform output -raw db_private_ip)" >> $GITHUB_OUTPUT

      - name: Generate AWS inventory
        if: steps.aws_check.outputs.active == 'true'
        run: |
          cat > aws-silverbank/ansible/inventory-aws.ini << EOF
          [edge]
          edge-nginx ansible_host=${{ steps.tf.outputs.edge_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [prod]
          prod-vm1-BLUE ansible_host=${{ steps.tf.outputs.blue_ip }}

          [prod:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/id_ed25519
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@${{ steps.tf.outputs.edge_ip }}'

          [db]
          db-postgresql ansible_host=${{ steps.tf.outputs.db_ip }}

          [db:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/id_ed25519
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@${{ steps.tf.outputs.edge_ip }}'
          EOF

      - name: Update app on AWS DR
        if: steps.aws_check.outputs.active == 'true'
        working-directory: aws-silverbank/ansible
        run: |
          ansible-playbook playbooks/deploy-production.yml \
            -i inventory-aws.ini \
            -e "app_tag=latest" \
            --vault-password-file ~/.vault-password

      - name: Health check AWS
        if: steps.aws_check.outputs.active == 'true'
        run: |
          sleep 30
          curl -f http://${{ steps.tf.outputs.edge_ip }}/api/health || exit 1
          echo "✅ AWS DR updated successfully"