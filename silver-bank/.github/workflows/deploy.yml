name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  build:
    name: Build and push Docker image
    runs-on: ubuntu-24.04
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mariusiordan --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank:${{ steps.tag.outputs.tag }}
            ghcr.io/mariusiordan/silverbank:latest

  deploy:
    name: Deploy to Proxmox
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/terraform-ansible-infrastructure
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy to GREEN
        run: |
          cd ansible
          ansible-playbook playbooks/deploy-green.yml \
            -e "app_tag=${{ needs.build.outputs.image_tag }}" \
            -i inventory.ini