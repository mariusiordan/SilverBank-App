version: '3.8'

services:
  # ─── DATABASE ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: silverbank-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppassword}
      POSTGRES_DB: ${DB_NAME:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND (Express API) ─────────────────────────
  backend:
    build: ./backend
    container_name: silverbank-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@db:5432/${DB_NAME:-appdb}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      PORT: 4000
      FRONTEND_URL: http://frontend:3000
    depends_on:
      db:
        condition: service_healthy

  # ─── FRONTEND (Next.js) ────────────────────────────
  frontend:
    build: .
    container_name: silverbank-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
