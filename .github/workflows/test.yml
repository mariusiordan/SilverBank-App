name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: silver-bank

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: silver-bank/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test