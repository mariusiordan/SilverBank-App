# .github/workflows/staging.yml
# Trigger: push to staging branch
# Flow:
#   lint
#     ├── test-jwt      ┐
#     ├── test-auth     ├── build frontend + backend → deploy to staging VM → integration tests
#     └── test-account  ┘

name: Staging

on:
  push:
    branches:
      - staging

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  test-jwt:
    name: JWT Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/jwt.test.ts

  test-auth:
    name: Auth Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/login.test.ts
      - run: npx vitest run __tests__/register.test.ts

  test-account:
    name: Account Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/account.test.ts

  build:
    name: Build Docker images
    runs-on: ubuntu-24.04
    needs: [test-jwt, test-auth, test-account]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          VERSION="v1.0"
          DATE=$(date +%Y-%m-%d)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=${VERSION}-staging-${DATE}-sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mariusiordan --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./silver-bank
          file: ./silver-bank/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-frontend:${{ steps.tag.outputs.tag }}
            ghcr.io/mariusiordan/silverbank-frontend:staging

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./silver-bank/backend
          file: ./silver-bank/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mariusiordan/silverbank-backend:${{ steps.tag.outputs.tag }}
            ghcr.io/mariusiordan/silverbank-backend:staging

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Install Ansible
        run: pip install ansible --break-system-packages && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Setup Ansible vault password
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault-password
          chmod 600 ~/.vault-password

      - name: Deploy to staging VM
        run: |
          cd proxmox-silverbank/ansible
          ansible-playbook playbooks/deploy-staging.yml \
            -e "app_tag=${{ needs.build.outputs.image_tag }}" \
            -i inventory.ini

  integration-tests:
    name: Integration Tests
    runs-on: self-hosted
    needs: deploy-staging
    steps:
      - name: Wait for app to start
        run: sleep 20

      - name: Run integration tests
        run: |
          TEST_EMAIL="ci-test-${GITHUB_RUN_ID}@test.com"

          # Health check
          curl -f http://192.168.7.70:4000/api/health || exit 1
          echo "✅ Health check passed"

          # Register
          REGISTER=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://192.168.7.70/api/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"CI Test\",\"email\":\"${TEST_EMAIL}\",\"password\":\"test123\"}")
          [ "$REGISTER" = "201" ] || exit 1
          echo "✅ Register passed"

          # Login + save cookie
          LOGIN=$(curl -s -c /tmp/cookies.txt -o /dev/null -w "%{http_code}" \
            -X POST http://192.168.7.70/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${TEST_EMAIL}\",\"password\":\"test123\"}")
          [ "$LOGIN" = "200" ] || exit 1
          echo "✅ Login passed"

          # Delete test user
          curl -s -b /tmp/cookies.txt \
            -X DELETE http://192.168.7.70/api/auth/delete \
            -H "Content-Type: application/json" > /dev/null
          echo "✅ Cleanup done"

          echo "✅ All integration tests passed"