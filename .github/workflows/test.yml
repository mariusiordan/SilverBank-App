name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'silver-bank/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      