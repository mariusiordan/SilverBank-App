version: '3.8'

services:
  backend:
    image: ghcr.io/mariusiordan/silverbank-backend:${APP_TAG:-latest}
    container_name: silverbank-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000

  frontend:
    image: ghcr.io/mariusiordan/silverbank-frontend:${APP_TAG:-latest}
    container_name: silverbank-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
