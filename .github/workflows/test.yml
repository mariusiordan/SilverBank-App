# .github/workflows/test.yml
# Runs on every push and pull request to any branch
# Tests run in parallel after lint passes
# If any test fails, the whole workflow fails and deploy is blocked
#
# Flow:
#   lint
#     ├── test-jwt      ┐
#     ├── test-auth     ├── all must pass before deploy
#     └── test-account  ┘

name: Test

on:
  push:
  pull_request:

jobs:
  # ============================================================
  # JOB 1 - ESLint
  # Runs first - if lint fails, no tests run
  # ============================================================
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ============================================================
  # JOB 2 - JWT Tests
  # Runs in parallel with other test jobs after lint passes
  # ============================================================
  test-jwt:
    name: JWT Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run JWT tests
        run: npx vitest run __tests__/jwt.test.ts

  # ============================================================
  # JOB 3 - Auth Tests (login + register)
  # Runs in parallel with other test jobs after lint passes
  # ============================================================
  test-auth:
    name: Auth Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vitest run __tests__/login.test.ts
      - run: npx vitest run __tests__/register.test.ts

  test-account:
    name: Account Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: silver-bank/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx run test __tests__/account.test.ts

